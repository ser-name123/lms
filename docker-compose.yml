# Local development infra. Production swaps DATABASE_URL to Supabase —
# nothing else changes.
services:
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_dev_password
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - lms-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Reserved for BullMQ queue processing (the "Queue Processing" requirement).
  # Host port 6380: 6379 is taken by the legacy Alfurqan stack.
  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  lms-pg-data:
